name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build SwiftPM product
        run: swift build --product canary-transcriber
      - name: Build app bundle
        run: ./scripts/build-canary-transcriber-app.sh
      - name: Verify app signature
        run: codesign --verify --deep --verbose=2 "dist/Canary Transcriber.app"
